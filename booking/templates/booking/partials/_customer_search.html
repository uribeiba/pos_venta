<div class="customer-search-container">
    <div class="input-group mb-2">
        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
        <input type="text" id="customer-search-input" class="form-control border-start-0 ps-0" placeholder="Buscar por RUT o nombre...">
    </div>
    <div id="customer-results" class="customer-results-dropdown d-none"></div>
    <input type="hidden" id="selected-customer-id">
    
    <div class="mt-3">
        <a class="text-decoration-none small" data-bs-toggle="collapse" href="#newCustomerCollapse" role="button">
            <i class="fas fa-user-plus me-1 text-success"></i> + Registrar nuevo cliente
        </a>
        <div class="collapse mt-2" id="newCustomerCollapse">
            <div class="card card-body bg-light p-3 rounded-4">
                <div class="mb-2">
                    <input type="text" id="new-rut" class="form-control form-control-sm" placeholder="RUT">
                </div>
                <div class="mb-2">
                    <input type="text" id="new-name" class="form-control form-control-sm" placeholder="Nombre completo">
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <input type="tel" id="new-phone" class="form-control form-control-sm" placeholder="Teléfono">
                    </div>
                    <div class="col-6">
                        <input type="email" id="new-email" class="form-control form-control-sm" placeholder="Email">
                    </div>
                </div>
                <button id="create-customer-btn" class="btn btn-sm btn-success w-100">Guardar cliente</button>
            </div>
        </div>
    </div>
</div>
