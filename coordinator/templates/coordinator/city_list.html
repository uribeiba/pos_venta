{% extends 'coordinator/base.html' %}
{% block title %}Ciudades{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h3>Ciudades</h3>
        <a href="{% url 'coordinator:city_new' %}" class="btn btn-primary"><i class="fas fa-plus"></i> Nueva ciudad</a>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>Nombre</th><th>Slug</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                {% for city in cities %}
                <tr>
                    <td>{{ city.name }}</td>
                    <td>{{ city.slug }}</td>
                    <td>
                        <a href="{% url 'coordinator:city_edit' city.id %}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i> Editar</a>
                        <a href="{% url 'coordinator:city_delete' city.id %}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar esta ciudad?')"><i class="fas fa-trash"></i> Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center">No hay ciudades registradas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
