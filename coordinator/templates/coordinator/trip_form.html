{% extends 'coordinator/base.html' %}
{% block title %}{% if trip.id %}Editar Viaje{% else %}Nuevo Viaje{% endif %}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h3>{% if trip.id %}Editar Viaje{% else %}Crear Viaje{% endif %}</h3></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label>Ruta</label>
                <select name="route" class="form-select" required>
                    <option value="">Seleccione</option>
                    {% for route in routes %}
                    <option value="{{ route.id }}" {% if trip.route_id == route.id %}selected{% endif %}>{{ route }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>Bus</label>
                <select name="bus" class="form-select" required>
                    <option value="">Seleccione</option>
                    {% for bus in buses %}
                    <option value="{{ bus.id }}" {% if trip.bus_id == bus.id %}selected{% endif %}>{{ bus.plate }} ({{ bus.company.name }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 🔥 NUEVO: Choferes y Auxiliar -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Chofer principal</label>
                    <select name="driver1" class="form-select">
                        <option value="">-- Seleccionar --</option>
                        {% for driver in drivers %}
                            <option value="{{ driver.id }}" {% if trip.driver1_id == driver.id %}selected{% endif %}>
                                {{ driver.full_name }} ({{ driver.rut }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Segundo chofer <small class="text-muted">(opcional)</small></label>
                    <select name="driver2" class="form-select">
                        <option value="">-- Sin segundo chofer --</option>
                        {% for driver in drivers %}
                            <option value="{{ driver.id }}" {% if trip.driver2_id == driver.id %}selected{% endif %}>
                                {{ driver.full_name }} ({{ driver.rut }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Auxiliar <small class="text-muted">(opcional)</small></label>
                    <select name="assistant" class="form-select">
                        <option value="">-- Sin auxiliar --</option>
                        {% for assistant in assistants %}
                            <option value="{{ assistant.id }}" {% if trip.assistant_id == assistant.id %}selected{% endif %}>
                                {{ assistant.full_name }} ({{ assistant.rut }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Fecha y hora de salida</label>
                <input type="datetime-local" name="departure" class="form-control" value="{{ trip.departure|date:'Y-m-d\\TH:i' }}" required>
            </div>
            <div class="mb-3">
                <label>Fecha y hora de llegada (opcional)</label>
                <input type="datetime-local" name="arrival" class="form-control" value="{{ trip.arrival|date:'Y-m-d\\TH:i' }}">
            </div>
            <div class="mb-3">
                <label>Total de asientos (opcional, se calcula automáticamente)</label>
                <input type="number" name="seats_total" class="form-control" value="{{ trip.seats_total }}">
            </div>
            <button type="submit" class="btn btn-success">Guardar Viaje</button>
            <a href="{% url 'coordinator:trip_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
