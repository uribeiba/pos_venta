{% extends 'coordinator/base.html' %}
{% block title %}{% if assistant.id %}Editar{% else %}Nuevo{% endif %} auxiliar{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h3>{% if assistant.id %}Editar Auxiliar{% else %}Nuevo Auxiliar{% endif %}</h3></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Nombre completo</label>
                    <input type="text" name="full_name" value="{{ assistant.full_name }}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>RUT</label>
                    <input type="text" name="rut" value="{{ assistant.rut }}" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Teléfono</label>
                    <input type="text" name="phone" value="{{ assistant.phone }}" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Correo electrónico</label>
                    <input type="email" name="email" value="{{ assistant.email }}" class="form-control">
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if assistant.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Activo</label>
            </div>
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{% url 'coordinator:assistant_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
